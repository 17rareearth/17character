<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔮 診断結果 | レアアース診断</title>

  <style>
    /* CSSはそのまま */
    body {
      font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
      background: #cfe1fd;
      color: #333;
      margin: 0;
      padding: 20px;
      line-height: 1.8;
    }

    #resultArea {
      max-width: 600px;
      margin: 0 auto;
    }

    .resultCard {
      background: white;
      padding: 30px;
      border-radius: 20px;
      margin-bottom: 20px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
      border-top: 8px solid #5b7cfa;
      text-align: center;
    }

    .rankLabel {
      display: inline-block;
      background: #5b7cfa;
      color: white;
      padding: 4px 15px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .scoreDisplay {
      font-size: 16px;
      margin-bottom: 15px;
    }

    .scoreDisplay strong {
      font-size: 24px;
      color: #e74c3c;
    }

    .charImage {
      width: 200px;
      height: auto;
      display: block;
      margin: 20px auto;
    }

    .longText {
      text-align: left;
      background: #ffffff;
      padding: 15px 0;
      border-top: 1px dashed #ddd;
      margin-top: 20px;
      font-size: 15px;
      white-space: pre-wrap;
      /* 改行を反映させる */
    }

    .compatibilityArea {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 12px;
      margin-top: 25px;
      border: 1px solid #eef0f2;
    }

    .btn-action {
      width: 280px;
      padding: 12px 20px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #fdfdfd;
      color: #333;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin: 10px auto;
      text-decoration: none;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>

<body>

  <div id="captureRegion">
    <h1 style="text-align: center;">🔮 レアアース性格診断 鑑定書</h1>
    <div id="resultArea">
    </div>
  </div>

  <div class="result-actions">
    <button id="save-image" class="btn-action">
      <span>🎖️</span> 結果を画像で保存
    </button>

    <a href="seikaku17.html" class="btn-action">
      <span>🗂️</span> 全17キャラの性格を見る
    </a>

    <a href="index_uranai.html" class="btn-action" style="background: #2c3e50; color: white;">
      <span>←</span> もう一度診断する
    </a>
  </div>

  <script src="js/kekka.js"></script>
  <script src="js/download.js"></script>

</body>

</html>
