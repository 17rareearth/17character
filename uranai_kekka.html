<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

.resultBox{
  background:white;
  padding:30px;
  border-radius:16px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
  max-width:500px;
  margin:0 auto;
}

h1{
  font-size:26px;
  margin-bottom:10px;
}

.percent{

  color:#5b7cfa;
  margin-bottom:20px;
}

.sub{
  margin-top:25px;
  font-size:14px;
  color:#666;
}

button{
  margin-top:30px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#5b7cfa;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="resultBox">
  <h1 id="mainName"></h1>
  <div class="percent" id="mainPercent"></div>
  <p id="mainText"></p>
  <p class="sub" id="subType"></p>
  <p class="sub" id="hiddenType"></p>

  <button onclick="location.href='index_uranai.html'">
