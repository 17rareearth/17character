<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>レアアース元素図鑑</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* 簡単なデザイン（お好みで調整してください） */
        body { font-family: sans-serif; text-align: center; padding: 20px; color: #333; }
        .container { max-width: 500px; margin: 0 auto; background: #f9f9f9; padding: 30px; border-radius: 20px; }
        .symbol { font-size: 1.2rem; color: #888; margin-top: -10px; }
        img { max-width: 200px; margin: 20px 0; }
        .description { text-align: left; line-height: 1.6; background: white; padding: 15px; border-radius: 10px; }
        .back-btn { display: inline-block; margin-top: 30px; color: #5b7cfa; text-decoration: none; }
    </style>
</head>
<body>

<div class="container">
    <h1 id="char-name">読み込み中...</h1>
    <p class="symbol" id="char-symbol"></p>
    
    <img id="char-img" src="" alt="">
    
    <div class="description">
        <h3>性格プロファイル</h3>
        <p id="char-desc"></p>
    </div>

    <a href="index.html" class="back-btn">← 診断トップに戻る</a>
</div>

<script src="kekka.js"></script>

<script>
    // 1. URLから「?id=sc」の部分を読み取る魔法の呪文
    const params = new URLSearchParams(window.location.search);
    const elementId = params.get('id'); // 'sc' などが取れる

    // 2. kekka.jsの中にあるデータから、一致するものを探す
    // ※resultsオブジェクトのキーが大文字(Sc)の場合はtoUpperCase()を使う
    const targetData = results[elementId.toUpperCase()] || results[Object.keys(results)[0]];

    // 3. 画面の各パーツを書き換える
    if (targetData) {
        document.title = `${targetData.name} | レアアース図鑑`;
        document.getElementById('char-name').innerText = targetData.name;
        document.getElementById('char-symbol').innerText = `元素記号: ${targetData.symbol}`;
        document.getElementById('char-desc').innerText = targetData.description;
        document.getElementById('char-img').src = `img/${targetData.symbol.toLowerCase()}.png`;
        document.getElementById('char-img').alt = targetData.name;
    }
</script>

</body>
</html>
